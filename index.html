<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP Algebra 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-1: #050818;
    --bg-2: #0e1438;
    --bg-3: #1a1245;
    --cyan: #00e5ff;
    --cyan-glow: #00e5ff80;
    --gold: #ffc233;
    --gold-glow: #ffc23380;
    --pink: #ff2d95;
    --green: #39ff14;
    --red: #ff3b3b;
    --text: #f0f4ff;
    --text-dim: #8a92b8;
    --panel: rgba(255, 255, 255, 0.04);
    --panel-border: rgba(255, 255, 255, 0.12);
    --primary-deep: #0099cc;
    --primary-darker: #006080;
    --grid-line: rgba(0, 229, 255, 0.04);
    --orb-1: rgba(0, 229, 255, 0.12);
    --orb-2: rgba(255, 45, 149, 0.10);
  }

  /* ============ THEME COLOR VARS ============ */
  body.theme-neon {
    --bg-1: #02010a; --bg-2: #07051c; --bg-3: #0c0828;
    --cyan: #00f0ff; --cyan-glow: rgba(0, 240, 255, 0.6);
    --gold: #b6ff00; --gold-glow: rgba(182, 255, 0, 0.5);
    --pink: #ff2bd6; --green: #b6ff00; --red: #ff3060;
    --text: #f5fafe; --text-dim: #7a8aa0;
    --primary-deep: #00cce0; --primary-darker: #007a8a;
    --grid-line: rgba(0, 240, 255, 0.05);
    --orb-1: rgba(0, 240, 255, 0.14); --orb-2: rgba(255, 43, 214, 0.12);
  }
  body.theme-galaxy {
    --bg-1: #0a0420; --bg-2: #1a0a40; --bg-3: #2d1560;
    --cyan: #b794ff; --cyan-glow: rgba(183, 148, 255, 0.5);
    --gold: #ffd700; --gold-glow: rgba(255, 215, 0, 0.5);
    --pink: #ff6ad5; --green: #5dffd6; --red: #ff5577;
    --text: #f0e8ff; --text-dim: #9c8bbc;
    --primary-deep: #8a5cd9; --primary-darker: #5e3995;
    --grid-line: rgba(183, 148, 255, 0.05);
    --orb-1: rgba(183, 148, 255, 0.14); --orb-2: rgba(255, 106, 213, 0.12);
  }
  body.theme-matrix {
    --bg-1: #000000; --bg-2: #001a0a; --bg-3: #00331f;
    --cyan: #00ff41; --cyan-glow: rgba(0, 255, 65, 0.5);
    --gold: #ff5500; --gold-glow: rgba(255, 85, 0, 0.5);
    --pink: #00ffaa; --green: #00ff41; --red: #ff3030;
    --text: #d0ffd0; --text-dim: #5a8a5a;
    --primary-deep: #00cc33; --primary-darker: #008822;
    --grid-line: rgba(0, 255, 65, 0.05);
    --orb-1: rgba(0, 255, 65, 0.13); --orb-2: rgba(0, 255, 170, 0.10);
  }
  body.theme-sakura {
    --bg-1: #fff5f7; --bg-2: #ffe5ed; --bg-3: #ffd5e3;
    --cyan: #d63384; --cyan-glow: rgba(214, 51, 132, 0.4);
    --gold: #c9303a; --gold-glow: rgba(201, 48, 58, 0.4);
    --pink: #5b3fa0; --green: #2d8a4d; --red: #c9303a;
    --text: #2d1f3a; --text-dim: #6b5878;
    --panel: rgba(45, 31, 58, 0.05);
    --panel-border: rgba(45, 31, 58, 0.18);
    --primary-deep: #a02466; --primary-darker: #6e1845;
    --grid-line: rgba(214, 51, 132, 0.06);
    --orb-1: rgba(214, 51, 132, 0.12); --orb-2: rgba(91, 63, 160, 0.10);
  }
  body.theme-court {
    --bg-1: #f5e6c8; --bg-2: #ead4ad; --bg-3: #dec092;
    --cyan: #1d3557; --cyan-glow: rgba(29, 53, 87, 0.4);
    --gold: #e76f00; --gold-glow: rgba(231, 111, 0, 0.45);
    --pink: #c9303a; --green: #2d8a4d; --red: #c9303a;
    --text: #1a2b40; --text-dim: #5a6b80;
    --panel: rgba(255, 250, 240, 0.55);
    --panel-border: rgba(29, 53, 87, 0.2);
    --primary-deep: #14253f; --primary-darker: #0c1a2e;
    --grid-line: rgba(29, 53, 87, 0.05);
    --orb-1: rgba(231, 111, 0, 0.10); --orb-2: rgba(29, 53, 87, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    background: radial-gradient(ellipse at top, var(--bg-2) 0%, var(--bg-1) 70%);
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 20%, var(--orb-1), transparent 40%),
      radial-gradient(circle at 85% 80%, var(--orb-2), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
  /* Hide grid background on themes that have their own treatment */
  body.theme-neon::before, body.theme-galaxy::before,
  body.theme-matrix::before, body.theme-sakura::before,
  body.theme-court::before { display: none; }

  body.theme-sakura {
    background:
      radial-gradient(ellipse at 15% 5%, #ffe5ed 0%, transparent 45%),
      radial-gradient(ellipse at 85% 95%, #ffd5e3 0%, transparent 45%),
      linear-gradient(180deg, #fff8fa 0%, #fff0f4 50%, #ffe5ed 100%);
  }
  body.theme-court {
    background:
      radial-gradient(ellipse at 50% 0%, #fff4dc 0%, transparent 40%),
      linear-gradient(180deg, #f5e6c8 0%, #ead4ad 50%, #dec092 100%);
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 36px;
    position: relative;
    z-index: 100;
  }
  .brand {
    font-family: 'Bungee', cursive;
    font-size: 1.4rem;
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan-glow);
    letter-spacing: 0.1em;
  }

  /* Theme picker */
  .theme-picker { position: relative; }
  .theme-toggle {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--text);
    line-height: 1;
    transition: all 0.15s;
  }
  .theme-toggle:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .theme-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    background: var(--bg-2);
    border: 2px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px;
    min-width: 200px;
    display: none;
    z-index: 1000;
    box-shadow: 0 16px 50px rgba(0, 0, 0, 0.6);
  }
  .theme-menu.open { display: block; }
  .theme-menu-title {
    font-family: 'Bungee', cursive;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    padding: 4px 8px 12px;
  }
  .theme-option {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 10px 12px;
    background: transparent;
    border: 2px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 600;
    transition: all 0.15s;
    text-align: left;
  }
  .theme-option:hover { background: var(--panel-border); }
  .theme-option.active {
    border-color: var(--cyan);
    background: var(--panel);
  }

  /* Main stage */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 60px;
  }
  .hero {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 36px;
    animation: heroIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .big-title {
    font-family: 'Bungee', cursive;
    font-size: clamp(3rem, 7vw, 5.5rem);
    line-height: 0.95;
    color: var(--cyan);
    text-shadow:
      0 0 20px var(--cyan-glow),
      0 0 40px var(--cyan-glow),
      4px 4px 0 var(--pink);
    letter-spacing: 0.05em;
  }
  .subtitle {
    font-size: clamp(1.1rem, 1.8vw, 1.4rem);
    color: var(--text-dim);
    max-width: 540px;
    line-height: 1.5;
    font-weight: 600;
  }
  .tagline {
    font-size: clamp(0.95rem, 1.4vw, 1.05rem);
    color: var(--text-dim);
    max-width: 520px;
    line-height: 1.6;
    font-style: italic;
    opacity: 0.85;
  }

  /* Big ENTER button */
  .btn {
    background: linear-gradient(135deg, var(--cyan), var(--primary-deep));
    color: #001020;
    border: none;
    padding: 22px 56px;
    border-radius: 16px;
    font-family: 'Bungee', cursive;
    font-size: clamp(1.3rem, 2vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow:
      0 8px 24px rgba(0, 0, 0, 0.4),
      0 0 30px var(--cyan-glow);
    margin-top: 12px;
  }
  .btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow:
      0 12px 32px rgba(0, 0, 0, 0.5),
      0 0 50px var(--cyan-glow);
  }
  .btn:active {
    transform: translateY(0) scale(1);
  }
  body.theme-sakura .btn,
  body.theme-court .btn {
    color: #ffffff;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 18px 24px;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    z-index: 1;
    position: relative;
  }
  .footer strong { color: var(--text); font-weight: 700; }

  @media (max-width: 720px) {
    .topbar { padding: 14px 20px; }
    .brand { font-size: 1.1rem; }
    .stage { padding: 20px 24px; }
    .hero { gap: 26px; }
    .btn { padding: 18px 40px; }
  }
</style>
</head>

<body>

<div class="app">

  <!-- ============ TOP BAR ============ -->
  <div class="topbar">
    <div class="brand">🎯 MVP ALGEBRA 1</div>
    <div class="theme-picker">
      <button class="theme-toggle" onclick="toggleThemeMenu(event)" title="Change theme">🎨</button>
      <div class="theme-menu" id="themeMenu">
        <div class="theme-menu-title">THEMES</div>
        <button class="theme-option active" data-theme="neon" onclick="setTheme('neon')"><span>🌃 Neon</span></button>
        <button class="theme-option" data-theme="galaxy" onclick="setTheme('galaxy')"><span>🪐 Galaxy</span></button>
        <button class="theme-option" data-theme="matrix" onclick="setTheme('matrix')"><span>💚 Matrix</span></button>
        <button class="theme-option" data-theme="sakura" onclick="setTheme('sakura')"><span>🌸 Sakura</span></button>
        <button class="theme-option" data-theme="court" onclick="setTheme('court')"><span>🏀 Court</span></button>
      </div>
    </div>
  </div>

  <!-- ============ HERO ============ -->
  <div class="stage">
    <div class="hero">
      <div class="big-title">WELCOME</div>
      <div class="subtitle">
        Florida B.E.S.T. Algebra 1 EOC Prep<br>
        Built for Hialeah Senior High School
      </div>
      <div class="tagline">
        Adaptive practice. Real-time diagnostics. Designed by a teacher.
      </div>
      <button class="btn" onclick="enterPlatform()">ENTER →</button>
    </div>
  </div>

  <!-- ============ FOOTER ============ -->
  <div class="footer">
    © Alondra Delgado · <strong>Hialeah Senior</strong> · MVP Algebra 1
  </div>
</div>

<script>
// ============================================================
// THEME SYSTEM (mirrors drill.html — shared via mvp_theme localStorage key)
// ============================================================
const THEMES = ['neon', 'galaxy', 'matrix', 'sakura', 'court'];

function toggleThemeMenu(e) {
  if (e) e.stopPropagation();
  document.getElementById('themeMenu').classList.toggle('open');
}

function setTheme(theme) {
  // Migrate any legacy 'arcade' / 'miami' preference to the new default 'neon'
  if (!THEMES.includes(theme)) theme = 'neon';
  THEMES.forEach(t => document.body.classList.remove('theme-' + t));
  document.body.classList.add('theme-' + theme);
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === theme);
  });
  document.getElementById('themeMenu').classList.remove('open');
  localStorage.setItem('mvp_theme', theme);
}

function loadSavedTheme() {
  setTheme(localStorage.getItem('mvp_theme') || 'neon');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.theme-picker')) {
    document.getElementById('themeMenu').classList.remove('open');
  }
});

// ============================================================
// ENTER → forward to signin.html
// ============================================================
function enterPlatform() {
  window.location.href = 'signin.html';
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadSavedTheme();
});
</script>
</body>
</html>
